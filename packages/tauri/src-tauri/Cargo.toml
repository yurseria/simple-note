[package]
name = "simple-note-tauri"
version = "0.1.0"
description = "A beautiful and simple plain text editor"
authors = ["yurseria"]
license = "MIT"
edition = "2021"

[lib]
name = "simple_note_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-os = "2"
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chardetng = "0.1"
encoding_rs = "0.8"
sys-locale = "0.3"
