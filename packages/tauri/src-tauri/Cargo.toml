[package]
name = "simple-note-tauri"
version = "0.12.0" # x-release-please-version
description = "A beautiful and simple plain text editor"
authors = ["yurseria"]
license = "MIT"
edition = "2021"

[lib]
name = "simple_note_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset", "devtools"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-os = "2"
tauri-plugin-process = "2"
tauri-plugin-store = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chardetng = "0.1"
encoding_rs = "0.8"
sys-locale = "0.3"
arboard = "3"
image = { version = "0.25", default-features = false, features = ["png"] }
chrono = "0.4"
rfd = "0.15"
base64 = "0.22"

# Windows/Linux: "연결 프로그램으로 열기" 시 새 인스턴스 대신 기존 창으로 argv 전달
# (macOS는 Apple Event로 단일 인스턴스가 보장되므로 불필요)
[target.'cfg(not(target_os = "macos"))'.dependencies]
tauri-plugin-single-instance = "2"
