<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#232840"/>
      <stop offset="100%" stop-color="#181c2d"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <g transform="translate(24, 24) scale(0.75)">
    <!-- Paper shadow -->
    <rect x="41" y="30" width="106" height="132" rx="10" fill="rgba(0,0,0,0.28)"/>
    <!-- Paper -->
    <rect x="38" y="27" width="106" height="132" rx="10" fill="#f0ebe0"/>
    <!-- Dog-ear corner fold -->
    <path d="M122 27 L144 49 L122 49 Z" fill="#ddd5c5"/>
    <!-- Text lines -->
    <rect x="53" y="63" width="72" height="8" rx="4" fill="#bcb4a4"/>
    <rect x="53" y="79" width="72" height="8" rx="4" fill="#bcb4a4"/>
    <rect x="53" y="95" width="72" height="8" rx="4" fill="#bcb4a4"/>
    <rect x="53" y="111" width="52" height="8" rx="4" fill="#bcb4a4"/>
    <!-- Golden pen: translate(88,158) rotate(45) -->
    <g transform="translate(88,158) rotate(45)">
      <!-- Pen body -->
      <rect x="-7" y="-120" width="14" height="120" rx="3" fill="#c4880c"/>
      <!-- Highlight strip -->
      <rect x="-3" y="-118" width="5" height="114" rx="2" fill="#f0b020" opacity="0.45"/>
      <!-- Cap / ferrule -->
      <rect x="-7" y="-120" width="14" height="15" rx="3" fill="#926010"/>
      <!-- Grip band -->
      <rect x="-7" y="-8" width="14" height="6" rx="1" fill="#a07018"/>
      <!-- Tip section -->
      <rect x="-5" y="-2" width="10" height="10" fill="#b08018"/>
      <!-- Nib -->
      <polygon points="-5,8 5,8 0,20" fill="#d4a020"/>
      <!-- Ink point -->
      <circle cx="0" cy="19" r="2" fill="#1a1510"/>
    </g>
  </g>
</svg>
