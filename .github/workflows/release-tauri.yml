name: Release Tauri (Windows)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        working-directory: packages/tauri
        run: npx tauri build

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/tauri/src-tauri/target/release/bundle/nsis/*.exe
            packages/tauri/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
