name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  # ── 1. auto shipit: 버전 범프 + 태그 + GitHub Release ──────
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      released: ${{ steps.release.outputs.released }}
      install_guide: ${{ steps.guide.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install auto
        run: npm i -D auto @auto-it/git-tag @auto-it/exec @auto-it/conventional-commits

      - name: Create labels
        run: npx auto create-labels
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Release
        id: release
        run: |
          npx auto shipit
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Load install guide
        if: steps.release.outputs.released == 'true'
        id: guide
        run: |
          {
            echo 'content<<GUIDE_EOF'
            cat .github/RELEASE_TEMPLATE.md
            echo 'GUIDE_EOF'
          } >> $GITHUB_OUTPUT

  # ── 2. Electron 패키징 (Windows + Linux) ────────────────────
  package-electron:
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: electron-windows
          - os: ubuntu-latest
            artifact: electron-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Electron
        run: npm run package:electron

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/electron/dist/!(*.blockmap|*-unpacked|*.yaml)

  # ── 3. Tauri 패키징 (Windows) ───────────────────────────────
  package-tauri:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Package Tauri
        run: npm run package:tauri

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            packages/tauri/src-tauri/target/release/bundle/nsis/*.exe
            packages/tauri/src-tauri/target/release/bundle/msi/*.msi

  # ── 4. 빌드 산출물을 릴리스에 첨부 ─────────────────────────
  upload-assets:
    needs: [release, package-electron, package-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          append_body: true
          body: |
            ---
            ${{ needs.release.outputs.install_guide }}
          files: |
            artifacts/electron-windows/*
            artifacts/electron-linux/*
            artifacts/tauri-windows/*
