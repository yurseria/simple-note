name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── 1. changelog 생성 ──────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
      install_guide: ${{ steps.guide.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$prev_tag" ]; then
            range="${prev_tag}..HEAD"
          else
            range="HEAD"
          fi

          {
            echo 'content<<CHANGELOG_EOF'
            git log $range --pretty=format:"- %s" --no-merges | grep -v "chore(release)"
            echo ''
            echo 'CHANGELOG_EOF'
          } >> $GITHUB_OUTPUT

      - name: Load install guide
        id: guide
        run: |
          {
            echo 'content<<GUIDE_EOF'
            cat .github/RELEASE_TEMPLATE.md
            echo 'GUIDE_EOF'
          } >> $GITHUB_OUTPUT

  # ── 2. Electron 패키징 (Windows + Linux) ────────────────────
  package-electron:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: electron-windows
          - os: ubuntu-latest
            artifact: electron-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Electron
        run: npm run package:electron

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/electron/dist/!(*.blockmap|*-unpacked|*.yaml)

  # ── 3. Tauri 패키징 (Windows) ───────────────────────────────
  package-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Package Tauri
        run: npm run package:tauri

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            packages/tauri/src-tauri/target/release/bundle/nsis/*.exe
            packages/tauri/src-tauri/target/release/bundle/msi/*.msi

  # ── 4. GitHub Release 생성 ──────────────────────────────────
  release:
    needs: [prepare, package-electron, package-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes
            ${{ needs.prepare.outputs.changelog }}

            ---
            ${{ needs.prepare.outputs.install_guide }}
          files: |
            artifacts/electron-windows/*
            artifacts/electron-linux/*
            artifacts/tauri-windows/*
