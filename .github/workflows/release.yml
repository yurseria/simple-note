name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. release-please: 버전 범프 PR 생성 / 머지 시 릴리스 생성 ──
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: release

  # ── 2. Electron 패키징 (Windows + Linux) ────────────────────
  package-electron:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: electron-windows
            paths: |
              packages/electron/dist/*.exe
              packages/electron/dist/*.msi
          - os: ubuntu-latest
            artifact: electron-linux
            paths: |
              packages/electron/dist/*.AppImage
              packages/electron/dist/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Electron
        run: npm run package:electron

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}

  # ── 3. Tauri 패키징 (Windows) ───────────────────────────────
  package-tauri:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Package Tauri
        run: npm run package:tauri

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            packages/tauri/src-tauri/target/release/bundle/nsis/*.exe
            packages/tauri/src-tauri/target/release/bundle/msi/*.msi

  # ── 4. 릴리스에 산출물 첨부 ─────────────────────────────────
  upload-assets:
    needs: [release-please, package-electron, package-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build release body
        id: body
        run: |
          {
            echo 'content<<BODY_EOF'
            cat .github/RELEASE_TEMPLATE.md
            echo 'BODY_EOF'
          } >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          append_body: true
          body: ${{ steps.body.outputs.content }}
          files: |
            artifacts/electron-windows/*
            artifacts/electron-linux/*
            artifacts/tauri-windows/*
