name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  # ── 1. 버전 범프 + 태그 + changelog ─────────────────────────
  bump:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
      changelog: ${{ steps.bump.outputs.changelog }}
      skipped: ${{ steps.bump.outputs.skipped }}
      install_guide: ${{ steps.guide.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version & tag
        id: bump
        run: |
          node scripts/bump-version.mjs
          if [ -z "$(git tag --points-at HEAD)" ]; then
            echo "skipped=true" >> $GITHUB_OUTPUT
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Push commit & tag
        if: steps.bump.outputs.skipped == 'false'
        run: |
          git push origin release --tags

      - name: Load install guide
        if: steps.bump.outputs.skipped == 'false'
        id: guide
        run: |
          {
            echo 'content<<GUIDE_EOF'
            cat .github/RELEASE_TEMPLATE.md
            echo 'GUIDE_EOF'
          } >> $GITHUB_OUTPUT

  # ── 2. Electron 패키징 (Windows + Linux) ────────────────────
  package-electron:
    needs: bump
    if: needs.bump.outputs.skipped == 'false'
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: electron-windows
          - os: ubuntu-latest
            artifact: electron-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Electron
        run: npm run package:electron

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/electron/dist/!(*.blockmap|*-unpacked|*.yaml)

  # ── 3. Tauri 패키징 (Windows) ───────────────────────────────
  package-tauri:
    needs: bump
    if: needs.bump.outputs.skipped == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Package Tauri
        run: npm run package:tauri

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            packages/tauri/src-tauri/target/release/bundle/nsis/*.exe
            packages/tauri/src-tauri/target/release/bundle/msi/*.msi

  # ── 4. GitHub Release 생성 ──────────────────────────────────
  release:
    needs: [bump, package-electron, package-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: ${{ needs.bump.outputs.tag }}
          body: |
            ## Changes
            ${{ needs.bump.outputs.changelog }}

            ---
            ${{ needs.bump.outputs.install_guide }}
          files: |
            artifacts/electron-windows/*
            artifacts/electron-linux/*
            artifacts/tauri-windows/*
