name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  # ── 1. auto shipit: 버전 범프 + 태그 + GitHub Release ──────
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      released: ${{ steps.release.outputs.released }}
      install_guide: ${{ steps.guide.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install auto
        run: |
          npm i -D auto @auto-it/git-tag @auto-it/exec @auto-it/conventional-commits
          git checkout -- package.json package-lock.json

      - name: Create labels
        run: npx auto create-labels
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Release
        id: release
        run: |
          npx auto shipit
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Load install guide
        if: steps.release.outputs.released == 'true'
        id: guide
        run: |
          {
            echo 'content<<GUIDE_EOF'
            cat .github/RELEASE_TEMPLATE.md
            echo 'GUIDE_EOF'
          } >> $GITHUB_OUTPUT

  # ── 2. Electron 패키징 (macOS + Windows + Linux) ────────────
  package-electron:
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: electron-macos
          - os: windows-latest
            artifact: electron-windows
          - os: ubuntu-latest
            artifact: electron-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Electron
        run: npm run package:electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist contents
        shell: bash
        run: ls -la packages/electron/dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/electron/dist/*.dmg
            packages/electron/dist/*.zip
            packages/electron/dist/*.exe
            packages/electron/dist/*.AppImage
            packages/electron/dist/*.deb
            packages/electron/dist/latest*.yml

  # ── 3. Tauri 패키징 (macOS + Windows + Linux) ──────────────
  package-tauri:
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: tauri-macos
          - os: windows-latest
            artifact: tauri-windows
          - os: ubuntu-latest
            artifact: tauri-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Package Tauri
        run: npm run package:tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Collect Tauri artifacts
        shell: bash
        run: |
          mkdir -p tauri-out
          find packages/tauri/src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.sig" -o -name "*.app.tar.gz" -o -name "*.nsis.zip" -o -name "*.msi.zip" \) -exec cp {} tauri-out/ \;
          ls -la tauri-out/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: tauri-out/*

  # ── 4. 빌드 산출물을 릴리스에 첨부 ─────────────────────────
  upload-assets:
    needs: [release, package-electron, package-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename Tauri assets with prefix
        shell: bash
        run: |
          for dir in artifacts/tauri-*; do
            for f in "$dir"/*; do
              [ -f "$f" ] || continue
              base="$(basename "$f")"
              # Note_0.3.0_aarch64.dmg → Note-Tauri_0.3.0_aarch64.dmg
              newbase="${base/Note/Note-Tauri}"
              [ "$base" = "$newbase" ] && continue
              mv "$f" "$dir/$newbase"
            done
          done

      - name: Generate latest.json for Tauri updater
        shell: bash
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/yurseria/simple-note/releases/download/${TAG}"

          # Helper: read .sig file content
          read_sig() { cat "$1" 2>/dev/null || echo ""; }

          # Find platform-specific artifacts and signatures
          MAC_TAR=$(find artifacts/tauri-macos -name "*.tar.gz" ! -name "*.sig" | head -1)
          MAC_SIG=$(find artifacts/tauri-macos -name "*.tar.gz.sig" | head -1)
          WIN_ZIP=$(find artifacts/tauri-windows -name "*.msi.zip" -o -name "*.nsis.zip" | head -1)
          WIN_SIG="${WIN_ZIP}.sig"
          LINUX_TAR=$(find artifacts/tauri-linux -name "*.tar.gz" ! -name "*.sig" | head -1)
          LINUX_SIG=$(find artifacts/tauri-linux -name "*.tar.gz.sig" | head -1)

          # Build platform entries
          PLATFORMS="{}"
          if [ -n "$MAC_TAR" ] && [ -f "$MAC_SIG" ]; then
            MAC_NAME="Note-Tauri_${VERSION}_$(basename "$MAC_TAR" | sed 's/Note_[^_]*_//')"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg url "${BASE_URL}/${MAC_NAME}" \
              --arg sig "$(read_sig "$MAC_SIG")" \
              '. + {"darwin-aarch64": {"url": $url, "signature": $sig}, "darwin-x86_64": {"url": $url, "signature": $sig}}')
          fi
          if [ -n "$WIN_ZIP" ] && [ -f "$WIN_SIG" ]; then
            WIN_NAME="Note-Tauri_${VERSION}_$(basename "$WIN_ZIP" | sed 's/Note_[^_]*_//')"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg url "${BASE_URL}/${WIN_NAME}" \
              --arg sig "$(read_sig "$WIN_SIG")" \
              '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
          fi
          if [ -n "$LINUX_TAR" ] && [ -f "$LINUX_SIG" ]; then
            LINUX_NAME="Note-Tauri_${VERSION}_$(basename "$LINUX_TAR" | sed 's/Note_[^_]*_//')"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg url "${BASE_URL}/${LINUX_NAME}" \
              --arg sig "$(read_sig "$LINUX_SIG")" \
              '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
          fi

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$NOW" \
            --argjson platforms "$PLATFORMS" \
            '{"version": $version, "pub_date": $pub_date, "platforms": $platforms}' > artifacts/latest.json

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: List all artifacts
        shell: bash
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          append_body: true
          body: |
            ---
            ${{ needs.release.outputs.install_guide }}
          files: |
            artifacts/electron-macos/*
            artifacts/electron-windows/*
            artifacts/electron-linux/*
            artifacts/tauri-macos/*
            artifacts/tauri-windows/*
            artifacts/tauri-linux/*
            artifacts/latest.json
